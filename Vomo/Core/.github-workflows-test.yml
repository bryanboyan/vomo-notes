name: iOS Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: sudo xcode-select -switch /Applications/Xcode_15.2.app
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Show available simulators
      run: xcrun simctl list devices
    
    - name: Build app
      run: |
        xcodebuild build \
          -scheme Vomo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -configuration Debug \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -scheme Vomo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -only-testing:VomoTests \
          -resultBundlePath TestResults-Unit \
          -enableCodeCoverage YES \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Run UI Tests
      run: |
        xcodebuild test \
          -scheme Vomo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -only-testing:VomoUITests \
          -resultBundlePath TestResults-UI \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: TestResults-Unit.xcresult
        retention-days: 30
    
    - name: Upload UI Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-test-results
        path: TestResults-UI.xcresult
        retention-days: 30
    
    - name: Generate Coverage Report
      if: success()
      run: |
        xcrun xccov view --report --json TestResults-Unit.xcresult > coverage.json
        echo "📊 Code Coverage Summary:"
        xcrun xccov view --report TestResults-Unit.xcresult
    
    - name: Upload Coverage
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.json
        retention-days: 90

  performance-test:
    name: Performance Tests
    runs-on: macos-14
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_15.2.app
    
    - name: Run Performance Tests
      run: |
        xcodebuild test \
          -scheme Vomo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -only-testing:VomoTests/PerformanceTests \
          -resultBundlePath PerformanceResults \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Upload Performance Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: PerformanceResults.xcresult
        retention-days: 90

  accessibility-test:
    name: Accessibility Tests
    runs-on: macos-14
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_15.2.app
    
    - name: Run Accessibility Tests
      run: |
        xcodebuild test \
          -scheme Vomo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -only-testing:VomoUITests/testVoiceOverLabels \
          -only-testing:VomoUITests/testDynamicTypeSupport \
          | xcpretty && exit ${PIPESTATUS[0]}
