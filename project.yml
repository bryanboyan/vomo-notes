name: Vomo
options:
  bundleIdPrefix: com.vomo-notes
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 7.0.0

targets:
  Vomo:
    type: application
    platform: iOS
    sources:
      - path: Vomo
        excludes:
          - "**/.DS_Store"
          - "**/TESTING.md"
          - "**/.github-*"
          - "**/setup_tests.sh"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.vomo-notes.app
        PRODUCT_NAME: Vomo
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Vomo"
        INFOPLIST_KEY_UISupportsDocumentBrowser: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Vomo needs microphone access for voice chat and dictation."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Vomo uses speech recognition for dictation mode when creating notes."
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: GRDB
        product: GRDB
      - target: VomoWatch

  VomoWatch:
    type: application
    platform: watchOS
    sources:
      - path: VomoWatch
        excludes:
          - "**/.DS_Store"
      # Shared voice types and WC protocol (no GrokRealtimeService — phone handles networking)
      - path: Vomo/Core/VoiceChat/Vendors.swift
      - path: Vomo/Core/VoiceChat/VoiceTypes.swift
      - path: Vomo/Core/VoiceChat/WatchVoiceProtocol.swift
      - path: Vomo/Core/VoiceChat/TranscriptManager.swift
      - path: Vomo/Core/VoiceChat/VoiceSettings.swift
      - path: Vomo/Core/VoiceChat/GrokKeychain.swift
      - path: Vomo/Core/VoiceChat/APIKeychain.swift
      - path: Vomo/Core/VoiceChat/SpeechTranscriber.swift
      # Shared config + theme
      - path: Vomo/Core/VomoConfig.swift
      - path: Vomo/Models/Theme.swift
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "4"
        PRODUCT_BUNDLE_IDENTIFIER: com.vomo-notes.app.watchkitapp
        PRODUCT_NAME: "Vomo Watch"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.vomo-notes.app
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Vomo"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Vomo needs microphone access for voice recording and dictation."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Vomo uses speech recognition for voice capture on your watch."
        SWIFT_EMIT_LOC_STRINGS: YES

  VomoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Vomo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vomo.tests
        GENERATE_INFOPLIST_FILE: YES
